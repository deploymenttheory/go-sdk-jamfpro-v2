name: go | Generate Coverage Documentation

on:
  schedule:
    # Run every Monday at 00:00 UTC
    - cron: '0 0 * * 1'
  workflow_dispatch:
    inputs:
      jamf_pro_version:
        description: 'Jamf Pro version (leave empty to auto-detect from live instance)'
        required: false
        default: ''
      use_live_instance:
        description: 'Fetch version from live Jamf Pro instance'
        required: false
        type: boolean
        default: true

permissions:
  contents: write
  pull-requests: write

jobs:
  generate-coverage-docs:
    name: '📊 Generate Coverage Documentation'
    runs-on: ubuntu-24.04-arm

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@a90bcbc6539c36a85cdfeb73f7e2f433735f215b # v2.15.0
        with:
          egress-policy: audit

      - name: Check Out
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@7a3fe6cf4cb3a834922a1244abfce67bcef6a0c5 # v6.2.0
        with:
          go-version-file: 'go.mod'
          cache-dependency-path: 'go.sum'
          cache: true

      - name: Set up Python
        uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b # v5.3.0
        with:
          python-version: '3.11'

      - name: Download Dependencies
        run: |
          echo "::group::📦 Downloading Go modules"
          go mod download
          go mod verify
          echo "::endgroup::"

      - name: Generate Coverage Documentation
        env:
          JAMF_PRO_VERSION: ${{ github.event.inputs.jamf_pro_version }}
          INSTANCE_DOMAIN: ${{ github.event.inputs.use_live_instance == true && secrets.INSTANCE_DOMAIN || '' }}
          AUTH_METHOD: ${{ github.event.inputs.use_live_instance == true && secrets.AUTH_METHOD || '' }}
          CLIENT_ID: ${{ github.event.inputs.use_live_instance == true && secrets.CLIENT_ID || '' }}
          CLIENT_SECRET: ${{ github.event.inputs.use_live_instance == true && secrets.CLIENT_SECRET || '' }}
        run: |
          echo "::group::📊 Generating Coverage Documentation"
          if [ -n "$INSTANCE_DOMAIN" ]; then
            echo "Using live Jamf Pro instance to detect version"
          elif [ -n "$JAMF_PRO_VERSION" ]; then
            echo "Using provided Jamf Pro version: $JAMF_PRO_VERSION"
          else
            echo "Using default Jamf Pro version: 11.12.0"
          fi
          python3 scripts/pipeline/coverage/generate_coverage_docs.py
          echo "::endgroup::"

      - name: Check for Changes
        id: check_changes
        run: |
          if git diff --quiet docs/coverage/; then
            echo "changes=false" >> $GITHUB_OUTPUT
            echo "No changes detected in coverage documentation"
          else
            echo "changes=true" >> $GITHUB_OUTPUT
            echo "Changes detected in coverage documentation"
          fi

      - name: Create Pull Request
        if: steps.check_changes.outputs.changes == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Extract version from generated docs
          DETECTED_VERSION=$(grep "Tested Against:" docs/coverage/README.md | head -1 | sed 's/.*Jamf Pro //' | sed 's/  $//')
          BRANCH_NAME="coverage-docs-$(date +%Y%m%d-%H%M%S)"
          
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          git checkout -b "$BRANCH_NAME"
          git add docs/coverage/
          
          git commit -m "docs: update coverage documentation

          - Updated coverage statistics
          - Refreshed test status
          - Updated example links
          - Tested against Jamf Pro ${DETECTED_VERSION}
          
          Auto-generated by coverage-docs workflow"
          
          git push origin "$BRANCH_NAME"
          
          gh pr create \
            --title "docs: update coverage documentation" \
            --body "## 📊 Coverage Documentation Update

          **Jamf Pro Version:** ${DETECTED_VERSION}  
          **Generated:** $(date -u '+%Y-%m-%d %H:%M:%S UTC')

          ### Changes
          - Updated coverage statistics
          - Refreshed test status for all services
          - Updated example links
          - Verified against Jamf Pro ${DETECTED_VERSION}

          ### Review
          Please review the updated coverage documentation in \`docs/coverage/\`.

          ---
          *Auto-generated by [coverage-docs workflow](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})*" \
            --base main \
            --head "$BRANCH_NAME"

      - name: Create Summary
        if: always()
        run: |
          # Extract version from generated docs
          DETECTED_VERSION=$(grep "Tested Against:" docs/coverage/README.md | head -1 | sed 's/.*Jamf Pro //' | sed 's/  $//')
          
          echo "## 📊 Coverage Documentation Generated" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Jamf Pro Version:** $DETECTED_VERSION" >> $GITHUB_STEP_SUMMARY
          echo "**Generated:** $(date -u '+%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          if [ "${{ steps.check_changes.outputs.changes }}" == "true" ]; then
            echo "✅ Documentation updated and committed" >> $GITHUB_STEP_SUMMARY
          else
            echo "ℹ️ No changes detected" >> $GITHUB_STEP_SUMMARY
          fi
          
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📚 View Documentation" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "[Coverage Documentation](https://github.com/${{ github.repository }}/tree/main/docs/coverage)" >> $GITHUB_STEP_SUMMARY
          
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📈 Statistics" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          grep "Total Services:" docs/coverage/README.md | head -1 >> $GITHUB_STEP_SUMMARY
          grep "Total Functions:" docs/coverage/README.md | head -1 >> $GITHUB_STEP_SUMMARY

      - name: Upload Documentation Artifact
        if: always()
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: coverage-documentation
          path: docs/coverage/
          retention-days: 90
