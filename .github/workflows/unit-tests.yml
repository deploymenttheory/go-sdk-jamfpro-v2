name: go | Unit Tests

on:
  workflow_dispatch:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    paths:
      - '.github/workflows/unit-tests.yml'
      - '**/*.go'
      - 'go.mod'
      - 'go.sum'

permissions:
  contents: read
  pull-requests: write  # Needed for commenting on PR
  issues: write  # Needed for commenting on PR

jobs:
  unit-tests:
    name: '🧪 Run Unit Tests'
    runs-on: ubuntu-24.04-arm
    if: github.event.pull_request.draft == false

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2.19.0
        with:
          egress-policy: audit

      - name: Check Out
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0  # Get full history for coverage analysis

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: 'go.mod'
          cache-dependency-path: 'go.sum'
          cache: true

      - name: Download Dependencies
        run: |
          echo "::group::📦 Downloading Go modules"
          go mod download
          go mod verify
          echo "::endgroup::"

      - name: Run Unit Tests
        run: |
          echo "::group::🧪 Unit Tests Setup"
          echo "========================================================================"
          echo "  Running Unit Tests with Coverage"
          echo "========================================================================"
          echo "::endgroup::"
          echo ""

          go test -v -race -coverprofile=coverage.out -covermode=atomic $(go list ./... | grep -v '/acceptance' | grep -v '/examples') 2>&1 | tee test_output.txt

          echo ""
          echo "::group::📊 Coverage Summary"
          go tool cover -func=coverage.out | tail -1
          echo "::endgroup::"

      - name: Generate Test Statistics
        if: always()
        run: |
          echo "::group::📈 Test Statistics"
          echo "========================================================================"
          echo "  Unit Test Statistics by Service"
          echo "========================================================================"
          echo ""
          
          # Parse test output to count tests per service and save to temp file
          grep "^=== RUN" test_output.txt | awk '
          {
            # Extract service name from test name (e.g., TestUnit_Accounts_List -> accounts)
            test_name = $3
            if (test_name ~ /^TestUnit_/) {
              # Remove TestUnit_ prefix
              sub(/^TestUnit_/, "", test_name)
              # Extract first part before underscore
              split(test_name, parts, "_")
              service = tolower(parts[1])
              service_tests[service]++
              total_tests++
            }
          }
          END {
            # Output service counts for sorting
            for (service in service_tests) {
              printf "%s %d\n", service, service_tests[service]
            }
            # Output totals on stderr to preserve them
            printf "TOTAL_SERVICES:%d\n", length(service_tests) > "/dev/stderr"
            printf "TOTAL_TESTS:%d\n", total_tests > "/dev/stderr"
          }
          ' 2> test_stats_totals.txt | sort -k1,1 > test_stats_sorted.txt
          
          # Print header
          printf "%-50s %s\n" "Service" "Tests"
          printf "%-50s %s\n" "-------" "-----"
          
          # Print sorted services
          awk '{printf "%-50s %5d\n", $1, $2}' test_stats_sorted.txt
          
          # Print footer with totals
          echo ""
          printf "%-50s %s\n" "========================================" "====="
          grep "TOTAL_SERVICES:" test_stats_totals.txt | awk -F: '{printf "%-50s %5d\n", "Total Services with Tests:", $2}'
          grep "TOTAL_TESTS:" test_stats_totals.txt | awk -F: '{printf "%-50s %5d\n", "Total Unit Tests:", $2}'
          printf "%-50s %s\n" "========================================" "====="
          
          # Cleanup temp files
          rm -f test_output.txt test_stats_sorted.txt test_stats_totals.txt
          
          echo ""
          echo "::endgroup::"

      - name: Generate Coverage Report
        if: always()
        run: |
          echo "::group::📈 Detailed Coverage Report"
          go tool cover -func=coverage.out
          echo "::endgroup::"

      - name: Upload coverage reports to Codecov
        if: always()
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v6.0.0
        with:
          token: ${{ secrets.CODECOV_TOKEN || '' }}
          slug: deploymenttheory/go-sdk-jamfpro-v2
          files: ./coverage.out
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false  # Don't fail CI if Codecov upload fails
          verbose: true  # Enable verbose output for debugging

      - name: Upload Coverage Artifact
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage-report
          path: coverage.out
          retention-days: 30

      # Save artifacts on failure
      - name: Save artifacts
        if: failure()
        run: |
          mkdir -p wr_actions
          echo ${{ github.repository_owner }} > wr_actions/ghowner.txt
          echo ${{ github.event.repository.name }} > wr_actions/ghrepo.txt
          echo ${{ github.event.pull_request.number }} > wr_actions/prnumber.txt

      - name: Upload artifacts
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: artifact
          path: wr_actions

      # Comment on failure
      - name: Get run url
        if: failure()
        run: |
          echo "gha_url=https://github.com/${{github.repository}}/actions/runs/${{github.run_id}}" >> $GITHUB_ENV

      - name: Send build failure comment
        if: failure() && github.event.pull_request.head.repo.full_name == github.repository
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        env:
          GHA_URL: ${{ env.gha_url }}
        with:
          result-encoding: string
          script: |
            const runUrl = process.env.GHA_URL;
            github.rest.issues.createComment({
              issue_number: ${{ github.event.pull_request.number }},
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `<b>🧪 Unit Test Failure</b> \n\n This pull request contains failing unit tests which need to be addressed [here](${runUrl}) .`
            })
