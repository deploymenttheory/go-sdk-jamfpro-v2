# Runs unit tests then acceptance tests against a real Jamf Pro instance every Sunday.
name: go | Acceptance Tests

on:
  schedule:
    # 00:00 UTC every Sunday
    - cron: '0 0 * * 0'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  acceptance-tests:
    name: '🧪 Run Acceptance Tests'
    runs-on: ubuntu-24.04-arm
    env:
      INSTANCE_DOMAIN: ${{ secrets.INSTANCE_DOMAIN }}
      AUTH_METHOD: ${{ secrets.AUTH_METHOD }}
      CLIENT_ID: ${{ secrets.CLIENT_ID }}
      CLIENT_SECRET: ${{ secrets.CLIENT_SECRET }}

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@a90bcbc6539c36a85cdfeb73f7e2f433735f215b # v2.15.0
        with:
          egress-policy: audit

      - name: Check Out
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0  # Get full history for coverage analysis

      - name: Set up Go
        uses: actions/setup-go@7a3fe6cf4cb3a834922a1244abfce67bcef6a0c5 # v6.2.0
        with:
          go-version-file: 'go.mod'
          cache-dependency-path: 'go.sum'
          cache: true
          go-version: stable
      
      - name: Download Dependencies
        run: |
          echo "::group::📦 Downloading Go modules"
          go mod download
          go mod verify
          echo "::endgroup::"

      - name: Verify Environment Configuration
        run: |
          echo "::group::🔍 Environment Verification"
          echo "Checking required environment variables..."
          if [ -z "$INSTANCE_DOMAIN" ]; then
            echo "::error::INSTANCE_DOMAIN is not set"
            exit 1
          fi
          if [ -z "$AUTH_METHOD" ]; then
            echo "::error::AUTH_METHOD is not set"
            exit 1
          fi
          if [ -z "$CLIENT_ID" ]; then
            echo "::error::CLIENT_ID is not set"
            exit 1
          fi
          if [ -z "$CLIENT_SECRET" ]; then
            echo "::error::CLIENT_SECRET is not set"
            exit 1
          fi
          echo "✅ INSTANCE_DOMAIN is set (hidden)"
          echo "✅ AUTH_METHOD is set (hidden)"
          echo "✅ CLIENT_ID is set (hidden)"
          echo "✅ CLIENT_SECRET is set (hidden)"
          echo "All required environment variables are configured"
          echo "::endgroup::"

      - name: Run Acceptance Tests
        run: |
          echo "::group::🧪 Acceptance Tests Setup"
          echo "========================================================================"
          echo "  Running Acceptance Tests with Coverage"
          echo "========================================================================"
          echo "::endgroup::"
          echo ""

          go test -v -count=1 -race -coverprofile=coverage.out -covermode=atomic ./jamfpro/acceptance/...

          echo ""
          echo "::group::📊 Coverage Summary"
          go tool cover -func=coverage.out | tail -1
          echo "::endgroup::"

      - name: Generate Coverage Report
        if: always()
        run: |
          echo "::group::📈 Detailed Coverage Report"
          go tool cover -func=coverage.out
          echo "::endgroup::"

      - name: Upload coverage reports to Codecov
        if: always()
        uses: codecov/codecov-action@671740ac38dd9b0130fbe1cec585b89eea48d3de # v5.5.2
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          slug: deploymenttheory/go-sdk-jamfpro-v2
          files: ./coverage.out
          flags: acceptancetests
          name: codecov-umbrella
          fail_ci_if_error: false  # Don't fail CI if Codecov upload fails
          verbose: true  # Enable verbose output for debugging
  
      - name: Upload Coverage Artifact
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: coverage-report
          path: coverage.out
          retention-days: 30

